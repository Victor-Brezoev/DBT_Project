sources:
  - name: jaffle_shop
    database: raw
    schema: jaffle_shop
    freshness:
      warn_after:
        count: 12
        period: hour
      error_after:
        count: 1
        period: day
    loaded_at_field: _etl_loaded_at
    tables:
      - name: orders
        columns:
          - name: id
            data_tests:
              - unique
              - not_null

      - name: customers
        freshness: null
        columns:
          - name: id
            data_tests:
              - unique
              - not_null

  - name: stripe
    database: raw
    schema: stripe
    tables:
      - name: payments
        columns:
          - name: id
            data_tests:
              - unique
              - not_null